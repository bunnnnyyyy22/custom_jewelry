<!doctype html>
<html lang="zh-Hant">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>客製化商品選擇</title>

    <style>
        :root {
            --e-global-color-primary: #834300;
            --e-global-color-secondary: #F9F5F0;
            --e-global-color-text: #AC7032;
            --e-global-color-accent: #F0CA74;
        }

        body {
            margin: 0;
            background: var(--e-global-color-secondary);
            color: var(--e-global-color-text);
            font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        .wrap {
            width: 100%;
            max-width: 1000px;
            padding: 48px 16px;
            text-align: center;
        }

        h1 {
            margin: 0 0 28px;
            font-size: 34px;
            font-weight: 1000;
            color: var(--e-global-color-text);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(240px, 1fr));
            gap: 18px;
            align-items: stretch;
        }

        @media (max-width: 900px) {
            .grid {
                grid-template-columns: 1fr;
            }
        }

        .card {
            background: rgba(255, 255, 255, .55);
            border: 1px solid rgba(172, 112, 50, .25);
            border-radius: 18px;
            padding: 18px;
            box-shadow: 0 12px 30px rgba(0, 0, 0, .08);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
            text-decoration: none;
        }

        .starfish-img {
            height: auto;
            max-width: 100%;
            display: block;
        }

        .icon {
            width: 200px;
            max-width: 70%;
            aspect-ratio: 1 / 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .icon svg {
            width: 100%;
            height: 100%;
            display: block;
        }

        .name {
            font-weight: 1000;
            font-size: 22px;
            color: var(--e-global-color-text);
            margin-top: 2px;
        }

        .desc {
            margin: 0;
            color: rgba(172, 112, 50, .95);
            line-height: 1.7;
            font-size: 14px;
            max-width: 340px;
        }

        .btn-area {
            margin-top: 16px;
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .go-btn {
            margin-top: auto;
            border: none;
            cursor: pointer;
            padding: 12px 18px;
            border-radius: 14px;
            font-weight: 1000;
            font-size: 16px;
            background: var(--e-global-color-accent);
            color: var(--e-global-color-primary);
            box-shadow: 0 10px 24px rgba(0, 0, 0, .12);
            transition: transform .05s ease;
        }

        .go-btn:active {
            transform: scale(.99);
        }

        /* ✅ 登出按鈕樣式（取代原本 btn-home） */
        .btn-logout {
            border: none;
            cursor: pointer;
            padding: 12px 22px;
            border-radius: 14px;
            font-weight: 900;
            font-size: 16px;
            background: transparent;
            color: #c0392b;
            border: 1px solid #c0392b;
            box-shadow: none;
            transition: transform .05s ease, background .15s ease;
        }

        .btn-logout:hover {
            background: rgba(192, 57, 43, 0.08);
        }

        .btn-logout:active {
            transform: scale(.99);
        }
    </style>
</head>

<body>
    <div class="wrap">
        <h1>選擇你要客製化的商品</h1>

        <div class="grid">
            <!-- 葉子 -->
            <div class="card">
                <div class="icon" aria-hidden="true">
                    <img src="./assets/leaf.svg" alt="" />
                </div>
                <div class="name">葉子</div>
                <p class="desc">金屬 / 米珠 / 刺繡 / 毛氈可自由調色。</p>
                <button class="go-btn" type="button" onclick="location.href='./leaf.html'">開始客製化</button>
            </div>

            <!-- 酪梨 -->
            <div class="card">
                <div class="icon" aria-hidden="true">
                    <img src="./assets/avocado.svg" alt="" />
                </div>
                <div class="name">酪梨</div>
                <p class="desc">酪梨本體多個部位可自由調色。</p>
                <button class="go-btn" type="button" onclick="location.href='./avocado.html'">開始客製化</button>
            </div>

            <!-- 海星 -->
            <div class="card">
                <div class="icon" aria-hidden="true">
                    <img class="starfish-img" src="./assets/starfish.png" alt="" />
                </div>
                <div class="name">海星</div>
                <p class="desc">金屬 / 米珠 / 刺繡可自由調色。</p>
                <button class="go-btn" type="button" onclick="location.href='./starfish.html'">開始客製化</button>
            </div>
        </div>

        <div class="btn-area">
            <!-- ✅ 返回首頁按鈕已刪除，改成登出按鈕 -->
            <button id="logoutBtn" class="btn-logout" type="button">登出</button>
            <button id="mockPayBtn" class="go-btn" type="button" style="margin-top:0;">
                ✅ 模擬付款成功
            </button>
        </div>
    </div>

    <script>
        // ===== 常數（統一定義，只定義一次） =====
        const PAID_KEY = "mock_paid";
        const LS_SESSION_KEY = "demo_session_v1"; // ✅ 統一用這個 key

        // ===== 模擬付款按鈕 =====
        document.getElementById("mockPayBtn").addEventListener("click", () => {
            localStorage.setItem(PAID_KEY, "1");
            alert("✅ 模擬付款成功！你可以開始下載 PNG");
        });

        // ===== 登出函式 =====
        function logout() {
            localStorage.removeItem(LS_SESSION_KEY); // ✅ 清除登入狀態
            localStorage.removeItem(PAID_KEY);       // ✅ 清除付款狀態
            alert("您已成功登出！");
            window.location.href = "hero.html";
        }

        // ===== 登出按鈕 =====
        document.getElementById("logoutBtn").addEventListener("click", () => {
            logout();
        });
    </script>
</body>

</html>
