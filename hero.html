<!doctype html>
<html lang="zh-Hant">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>米珠刺繡客製化平台</title>

    <style>
        :root {
            --e-global-color-primary: #834300;
            --e-global-color-secondary: #F9F5F0;
            --e-global-color-text: #AC7032;
            --e-global-color-accent: #F0CA74;
        }

        body {
            margin: 0;
            font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
            background: var(--e-global-color-secondary);
            color: var(--e-global-color-text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .wrap {
            width: 100%;
            max-width: 900px;
            padding: 48px 16px;
            text-align: center;
        }

        h1 {
            margin: 0 0 12px;
            font-size: 40px;
            font-weight: 1000;
            letter-spacing: 1px;
            color: var(--e-global-color-text);
        }

        p {
            margin: 0 auto 28px;
            max-width: 520px;
            color: rgba(172, 112, 50, .95);
            font-size: 16px;
            line-height: 1.8;
        }

        /* ✅ 修正：按鈕置中、手機自動換行、寬度限制 */
        .btns {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
            margin-top: 10px;
        }

        .btn {
            /* ✅ 修正：min-width 改小，手機不會爆版 */
            min-width: 140px;
            width: auto;
            border: none;
            cursor: pointer;
            padding: 14px 22px;
            border-radius: 14px;
            font-weight: 1000;
            font-size: 18px;
            color: var(--e-global-color-primary);
            background: var(--e-global-color-accent);
            box-shadow: 0 10px 24px rgba(0, 0, 0, .12);
            transition: transform .05s ease;
        }

        .btn:active {
            transform: scale(.99);
        }

        /* ✅ 手機：三顆按鈕各自佔一行，完全置中 */
        @media (max-width: 520px) {
            .btns {
                flex-direction: column;
                align-items: center;
            }

            .btn {
                width: 100%;
                max-width: 320px;
            }
        }

        /* ===== Modal ===== */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .35);
            display: none;
            align-items: center;
            justify-content: center;
            padding: 16px;
            z-index: 999;
        }

        .modal-overlay.show {
            display: flex;
        }

        .modal {
            width: 100%;
            max-width: 520px;
            background: #fff;
            border-radius: 18px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, .25);
            overflow: hidden;
        }

        .modal-header {
            padding: 16px 18px;
            background: var(--e-global-color-secondary);
            border-bottom: 1px solid rgba(172, 112, 50, .25);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .modal-title {
            font-weight: 1000;
            color: var(--e-global-color-text);
            font-size: 18px;
            margin: 0;
        }

        .modal-close {
            border: none;
            background: transparent;
            cursor: pointer;
            font-size: 18px;
            padding: 6px 10px;
            border-radius: 10px;
        }

        .modal-close:hover {
            background: rgba(172, 112, 50, .08);
        }

        .modal-body {
            padding: 18px;
            text-align: left;
        }

        .field {
            margin-bottom: 14px;
        }

        .field label {
            display: block;
            font-weight: 900;
            margin-bottom: 8px;
            color: var(--e-global-color-text);
        }

        .field input {
            width: 100%;
            padding: 12px 12px;
            border: 1px solid rgba(172, 112, 50, .25);
            border-radius: 12px;
            outline: none;
            font-size: 15px;
            box-sizing: border-box;
        }

        .field input:focus {
            border-color: rgba(172, 112, 50, .6);
            box-shadow: 0 0 0 3px rgba(240, 202, 116, .28);
        }

        /* ✅ modal 按鈕區也置中 */
        .modal-actions {
            display: flex;
            gap: 12px;
            justify-content: center;
            padding: 0 18px 18px;
        }

        .modal-actions .btn {
            flex: 1;
            min-width: 0;
            font-size: 16px;
        }

        .btn-secondary {
            background: transparent;
            color: var(--e-global-color-text);
            border: 1px solid rgba(172, 112, 50, .35);
            box-shadow: none;
        }

        .btn-secondary:hover {
            background: rgba(172, 112, 50, .08);
        }

        /* ✅ 修正：右邊按鈕文字改成 --e-global-color-text */
        .btn-primary {
            background: var(--e-global-color-accent);
            color: var(--e-global-color-text);
            border: none;
        }
    </style>
</head>

<body>
    <div class="wrap">
        <h1>米珠刺繡客製化平台</h1>
        <p>
            免費體驗【葉子🍂】客製化；需要完整體驗流程請登入/註冊。
        </p>

        <div class="btns">
            <button class="btn" id="btnFree">免費體驗</button>
            <button class="btn" id="btnLogin">登入</button>
            <button class="btn" id="btnRegister">註冊新帳號</button>
        </div>
    </div>

    <!-- 登入 Modal -->
    <div class="modal-overlay" id="loginOverlay" aria-hidden="true">
        <div class="modal" role="dialog" aria-modal="true" aria-labelledby="loginTitle">
            <div class="modal-header">
                <h2 class="modal-title" id="loginTitle">登入</h2>
                <button class="modal-close" id="closeLogin" aria-label="Close">✕</button>
            </div>

            <div class="modal-body">
                <div class="field">
                    <label for="loginAccount">帳號</label>
                    <input id="loginAccount" type="text" placeholder="請輸入帳號" />
                </div>
                <div class="field">
                    <label for="loginPassword">密碼</label>
                    <input id="loginPassword" type="password" placeholder="請輸入密碼" />
                </div>
            </div>

            <div class="modal-actions">
                <button class="btn btn-secondary" id="cancelLogin" type="button">取消</button>
                <button class="btn btn-primary" id="doLogin" type="button">登入</button>
            </div>
        </div>
    </div>

    <!-- 註冊 Modal -->
    <div class="modal-overlay" id="registerOverlay" aria-hidden="true">
        <div class="modal" role="dialog" aria-modal="true" aria-labelledby="registerTitle">
            <div class="modal-header">
                <h2 class="modal-title" id="registerTitle">註冊新帳號</h2>
                <button class="modal-close" id="closeRegister" aria-label="Close">✕</button>
            </div>

            <div class="modal-body">
                <div class="field">
                    <label for="regName">姓名</label>
                    <input id="regName" type="text" placeholder="請輸入姓名" />
                </div>
                <div class="field">
                    <label for="regPhone">電話</label>
                    <input id="regPhone" type="text" placeholder="請輸入電話" />
                </div>
                <div class="field">
                    <label for="regAccount">帳號</label>
                    <input id="regAccount" type="text" placeholder="請輸入帳號" />
                </div>
                <div class="field">
                    <label for="regPassword">密碼</label>
                    <input id="regPassword" type="password" placeholder="請輸入密碼" />
                </div>
            </div>

            <div class="modal-actions">
                <button class="btn btn-secondary" id="cancelRegister" type="button">取消</button>
                <button class="btn btn-primary" id="doRegister" type="button">註冊</button>
            </div>
        </div>
    </div>

    <script>
        const LS_USERS_KEY = "demo_users_v1";
        const LS_SESSION_KEY = "demo_session_v1";

        function loadUsers() {
            const raw = localStorage.getItem(LS_USERS_KEY);
            return raw ? JSON.parse(raw) : {};
        }

        function saveUsers(users) {
            localStorage.setItem(LS_USERS_KEY, JSON.stringify(users));
        }

        function setSession(account) {
            localStorage.setItem(LS_SESSION_KEY, JSON.stringify({ account }));
        }

        function openModal(overlayEl) {
            overlayEl.classList.add("show");
            overlayEl.setAttribute("aria-hidden", "false");
        }

        function closeModal(overlayEl) {
            overlayEl.classList.remove("show");
            overlayEl.setAttribute("aria-hidden", "true");
        }

        const btnFree = document.getElementById("btnFree");
        const btnLogin = document.getElementById("btnLogin");
        const btnRegister = document.getElementById("btnRegister");

        const loginOverlay = document.getElementById("loginOverlay");
        const registerOverlay = document.getElementById("registerOverlay");

        btnFree.addEventListener("click", () => {
            window.location.href = "./leaf.html?mode=free";
        });

        btnLogin.addEventListener("click", () => {
            openModal(loginOverlay);
            document.getElementById("loginAccount").focus();
        });

        btnRegister.addEventListener("click", () => {
            openModal(registerOverlay);
            document.getElementById("regName").focus();
        });

        document.getElementById("closeLogin").addEventListener("click", () => closeModal(loginOverlay));
        document.getElementById("cancelLogin").addEventListener("click", () => closeModal(loginOverlay));
        document.getElementById("closeRegister").addEventListener("click", () => closeModal(registerOverlay));
        document.getElementById("cancelRegister").addEventListener("click", () => closeModal(registerOverlay));

        loginOverlay.addEventListener("click", (e) => { if (e.target === loginOverlay) closeModal(loginOverlay); });
        registerOverlay.addEventListener("click", (e) => { if (e.target === registerOverlay) closeModal(registerOverlay); });

        // ===== 登入 =====
        document.getElementById("doLogin").addEventListener("click", () => {
            const account = document.getElementById("loginAccount").value.trim();
            const password = document.getElementById("loginPassword").value;

            if (!account || !password) { alert("請輸入帳號與密碼。"); return; }

            const users = loadUsers();
            const user = users[account];

            if (!user) { alert("找不到此帳號，請確認後再試一次。"); return; }
            if (user.password !== password) { alert("密碼錯誤，請重新輸入。"); return; }

            setSession(account);
            closeModal(loginOverlay);
            alert("登入成功！");
            window.location.href = "./shop.html";
        });

        // ===== 註冊 =====
        document.getElementById("doRegister").addEventListener("click", () => {
            const name = document.getElementById("regName").value.trim();
            const phone = document.getElementById("regPhone").value.trim();
            const account = document.getElementById("regAccount").value.trim();
            const password = document.getElementById("regPassword").value;

            if (!name || !phone || !account || !password) {
                alert("所有欄位皆必填（姓名、電話、帳號、密碼）。");
                return;
            }

            const users = loadUsers();
            if (users[account]) { alert("此帳號已存在，請換一個帳號再試。"); return; }

            users[account] = { name, phone, password, isPaid: 0 };
            saveUsers(users);

            closeModal(registerOverlay);
            alert("註冊成功！請到登入視窗輸入帳號密碼。");
            btnLogin.click();
        });

        window.addEventListener("keydown", (e) => {
            if (e.key === "Escape") {
                closeModal(loginOverlay);
                closeModal(registerOverlay);
            }
        });
    </script>
</body>

</html>
